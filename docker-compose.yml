services:
  db:
    image: postgres:16
    container_name: postgres-bookblog
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./lib/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
